<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="stem" x1="28" y1="88" x2="28" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FBBA25"/>
      <stop offset="55%" stop-color="#F97060"/>
      <stop offset="100%" stop-color="#F9508A"/>
    </linearGradient>
    <linearGradient id="upper" x1="28" y1="50" x2="80" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F9508A"/>
      <stop offset="100%" stop-color="#F72C9E"/>
    </linearGradient>
    <linearGradient id="lower" x1="28" y1="50" x2="80" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6B5CE7"/>
      <stop offset="100%" stop-color="#38BDFC"/>
    </linearGradient>
  </defs>
  <!-- Lower arm (behind) -->
  <line x1="30" y1="52" x2="82" y2="92" stroke="url(#lower)" stroke-width="15" stroke-linecap="round"/>
  <!-- Stem -->
  <line x1="28" y1="12" x2="28" y2="88" stroke="url(#stem)" stroke-width="17" stroke-linecap="round"/>
  <!-- Upper arm (on top) -->
  <line x1="30" y1="48" x2="82" y2="8" stroke="url(#upper)" stroke-width="15" stroke-linecap="round"/>
</svg>
